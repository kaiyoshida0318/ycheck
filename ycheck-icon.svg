<svg xmlns="http://www.w3.org/2000/svg" width="500" height="200" viewBox="0 0 500 200">
  <!-- 背景: Yahoo!赤の角丸バナー -->
  <rect width="500" height="200" rx="20" ry="20" fill="#E4002B"/>

  <!-- 左: 大きなチェックマーク -->
  <path d="M 42 110 L 82 150 L 162 56"
        fill="none" stroke="#FFFFFF" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 仕切り線 -->
  <line x1="185" y1="30" x2="185" y2="170" stroke="#2D0000" stroke-width="3"/>

  <!-- 右: Ycheck のテキスト -->
  <text x="205" y="128" font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-size="68" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Ycheck</text>
</svg>
