<svg xmlns="http://www.w3.org/2000/svg" width="620" height="200" viewBox="0 0 620 200">
  <!-- 背景: Yahoo!赤の角丸バナー -->
  <rect width="620" height="200" rx="22" ry="22" fill="#E4002B"/>

  <!-- 左: 大きなチェックマーク（v98: 横幅拡大のため +60px シフト） -->
  <path d="M 102 110 L 142 150 L 222 56"
        fill="none" stroke="#FFFFFF" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 仕切り線 -->
  <line x1="245" y1="30" x2="245" y2="170" stroke="#2D0000" stroke-width="3"/>

  <!-- 右: Ycheck のテキスト -->
  <text x="265" y="128" font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-size="68" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Ycheck</text>
</svg>
