name: Yahoo Rank Check

on:
  schedule:
    # 毎日 JST 04:00 = UTC 19:00(前日)
    - cron: '0 19 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # リポジトリへのコミット権限

jobs:
  rank-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run rank check
        env:
          YAHOO_APP_ID: ${{ secrets.YAHOO_APP_ID }}
        run: python scripts/rank_check.py

      - name: Commit and push rank.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rank.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            git commit -m "chore: update rank.json ($TIMESTAMP JST)"
            git push
          fi
